name: CI
on: [push]
jobs:
  test:
    name: Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v2
      - name: Install system dependencies
        run: sudo apt-get install libgtk-4-dev
      - name: Test
        uses: actions-rs/cargo@v1
        with:
          command: test
  format:
    name: Format
    runs-on: ubuntu-22.04
    needs: test
    steps:
      - uses: actions/checkout@v2
      - name: Install system dependencies
        run: sudo apt-get install libgtk-4-dev
      - name: Verify autoformatter
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: -- --check
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    needs: test
    steps:
      - uses: actions/checkout@v2
      - name: Install system dependencies
        run: sudo apt-get install libgtk-4-dev
      - name: Verify linter
        uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: -- -D warnings
